<!DOCTYPE html>
<html>
    <head>
        <title>Stream Weather Overlay by PixelPlush</title>
        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=UA-135113520-1"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'UA-135113520-1');
        </script>
        <link rel="stylesheet" href="https://cdn.pixelplush.dev/weather/web/fonts.css" />
        <script src="https://cdn.pixelplush.dev/assets/pinkfluffyunicorn.min.js"></script>
        <script src="https://cdn.pixelplush.dev/weather/web/weather.min.js"></script>
        <style>
            * {
                background-color: transparent;
                margin: 0;
                padding: 0;
                border: 0;
            }
        </style>
    </head>
    <body>
        <div id="unicorn-display"></div>
        <script>
            const params = new URLSearchParams( location.search );
            setupGame( "Stream Weather", {
                requires: "addon_streamweather",
                path: "https://cdn.pixelplush.dev",
                // weather: {
                //     "Heavy Rain": {

                //     }
                // }
            }, {
                channel: params.get( "channel" ),
                oauth: params.get( "oauth" ),
                refreshToken: params.get( "refreshToken" ),
                messageFormat: params.get( "messageFormat" ),
                volume: params.get( "volume" ),
                rain: params.get( "rain" ),
                rainTime: params.get( "rainTime" ),
                heavyrain: params.get( "heavyrain" ),
                heavyrainTime: params.get( "heavyrainTime" ),
                lightning: params.get( "lightning" ),
                rainbow: params.get( "rainbow" ),
                sunshine: params.get( "sunshine" ),
                blossoms: params.get( "blossoms" ),
                blossomsTime: params.get( "blossomsTime" ),
                snow: params.get( "snow" ),
                snowTime: params.get( "snowTime" ),
                blizzard: params.get( "blizzard" ),
                blizzardTime: params.get( "blizzardTime" ),
                hail: params.get( "hail" ),
                hailTime: params.get( "hailTime" ),
                leaf: params.get( "leaf" ),
                leafTime: params.get( "leafTime" ),
                rainstorm: params.get( "rainstorm" ),
                rainstormTime: params.get( "rainstormTime" ),
            });
        </script>
    </body>
</html>
